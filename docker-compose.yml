name: Layer8

services:
  forward-proxy:
    image: dtpthao/forward-proxy:latest
    container_name: forward-proxy
    ports:
      - "6191:6191"
    env_file:
      - ./forward-proxy/.env
    volumes:
      - ./logs/fp:/var/log/layer8
    restart: on-failure
    stdin_open: true
    tty: true
    networks:
      layer8-network:
        ipv4_address: 10.10.10.101
    depends_on:
      influxdb2:
        condition: service_healthy
    extra_hosts:
      - "rp.layer8.com:10.10.10.102"
      - "auth.layer8.com:10.10.10.103"

  reverse-proxy:
    image: dtpthao/reverse-proxy:latest
    container_name: reverse-proxy
    env_file:
      - ./reverse-proxy/.env
    ports:
      - "6193:6193"
    volumes:
      - ./logs/rp:/var/log/layer8
    restart: on-failure
    stdin_open: true
    tty: true
    networks:
      layer8-network:
        ipv4_address: 10.10.10.102

  server:
    image: dtpthao/auth-server:0.4.0
    container_name: server
    env_file:
      - ./auth-server/.env
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb2:
        condition: service_healthy
    restart: on-failure
    stdin_open: true
    tty: true
    networks:
      layer8-network:
        ipv4_address: 10.10.10.103

  influxdb2:
    container_name: influxdb2
    image: influxdb:2
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - ./tmp/influxdb2-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=somethingthatyoudontknow
      - DOCKER_INFLUXDB_INIT_ORG=layer8org
      - DOCKER_INFLUXDB_INIT_BUCKET=layer8bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=DEFAULT_TOKEN_FOR_TESTING
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      layer8-network:
        ipv4_address: 10.10.10.104

  postgres:
    container_name: postgres
    image: postgres:13
    restart: always
    environment:
      - POSTGRES_USER=layer8
      - POSTGRES_PASSWORD=cRACtIeRChYsiNFinuMp
      - POSTGRES_DB=layer8db
    volumes:
      - ./tmp/pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U layer8development" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      layer8-network:
        ipv4_address: 10.10.10.105

networks:
  layer8-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
