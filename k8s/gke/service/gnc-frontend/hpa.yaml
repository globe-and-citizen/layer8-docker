apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gnc-frontend-hpa
  namespace: layer8
  labels:
    app: gnc-frontend
    app.kubernetes.io/name: gnc-frontend
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gnc-frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
