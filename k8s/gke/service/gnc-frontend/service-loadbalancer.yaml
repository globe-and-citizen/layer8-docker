apiVersion: v1
kind: Service
metadata:
  name: gnc-frontend
  namespace: layer8
  labels:
    app: gnc-frontend
    app.kubernetes.io/name: gnc-frontend
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  ports:
  - port: 5173
    targetPort: 5173
    protocol: TCP
    name: default
  - port: 80
    targetPort: 5173
    protocol: TCP
    name: http
  - port: 443
    targetPort: 5173
    protocol: TCP
    name: https
  selector:
    app: gnc-frontend
