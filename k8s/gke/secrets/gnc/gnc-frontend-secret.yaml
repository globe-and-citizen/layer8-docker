apiVersion: v1
kind: Secret
metadata:
  name: gnc-frontend-secret
  namespace: layer8
  labels:
    app: gnc-frontend
    app.kubernetes.io/name: gnc-frontend
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  # Frontend Configuration
  # Add any environment variables needed by the frontend here
  # For example, if the frontend needs to know the backend URL:
  # VITE_API_URL: "http://gnc-backend.layer8.svc.cluster.local:8080"
  # REACT_APP_API_URL: "http://gnc-backend.layer8.svc.cluster.local:8080"
  PLACEHOLDER: "add_frontend_env_vars_as_needed"
