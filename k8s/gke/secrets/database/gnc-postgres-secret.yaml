apiVersion: v1
kind: Secret
metadata:
  name: gnc-postgres-secret
  namespace: layer8
  labels:
    app: gnc-postgres
    app.kubernetes.io/name: gnc-postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # PostgreSQL User Credentials
  POSTGRES_USER: "globeandcitizen"
  POSTGRES_PASSWORD: "masterkey"
  POSTGRES_DB: "stats-api-go"

  # Alternative key names (for compatibility)
  postgres-user: "globeandcitizen"
  postgres-password: "masterkey"
  postgres-db: "stats-api-go"

  # Connection String
  postgres-connection-string: "postgres://globeandcitizen:masterkey@gnc-postgres.layer8.svc.cluster.local:5432/stats-api-go?sslmode=disable"

  # PGDATA Path (if needed)
  PGDATA: "/var/lib/postgresql/data/pgdata"
